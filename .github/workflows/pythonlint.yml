name: "Linting"

on: [push]
jobs:
  pylint:
    name: "Python Code Quality and Lint (${{ matrix.group }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - group: linting
            commands: |
              uv run --group linting pylint ebdamame --ignore=version.py
              uv run --group linting pylint main.py
          - group: type_check
            commands: |
              uv run --group type_check mypy --show-error-codes --strict src/ebdamame
              uv run --group type_check mypy --show-error-codes unittests
              uv run --group type_check mypy --show-error-codes main.py
          - group: spell_check
            commands: |
              uv run --group spell_check codespell --ignore-words=domain-specific-terms.txt src
              uv run --group spell_check codespell --ignore-words=domain-specific-terms.txt README.md
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.14"
      - name: Run ${{ matrix.group }}
        run: ${{ matrix.commands }}
